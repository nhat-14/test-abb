name: Create PR From Abbreviation Issue

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  issue-to-pr:
    if: contains(github.event.issue.labels.*.name, 'enhancement')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply issue contents to markdown data
        id: process
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: python .github/scripts/process_abbreviation_issue.py

      - name: Detect file changes
        id: diff
        run: |
          if git diff --quiet -- data/abbreviations.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.diff.outputs.has_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: ${{ steps.process.outputs.commit_message }}
          title: ${{ steps.process.outputs.pr_title }}
          body: ${{ steps.process.outputs.pr_body }}
          branch: issue/${{ github.event.issue.number }}-abbreviation
          add-paths: data/abbreviations.md
          delete-branch: true

      - name: Comment on issue with pull request link
        if: steps.diff.outputs.has_changes == 'true' && steps.cpr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `自動で Pull Request を作成しました: ${process.env.PR_URL}`
            });

      - name: Comment when nothing changed
        if: steps.diff.outputs.has_changes != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '変更内容が既存データと同じため、新しい Pull Request は作成されませんでした。'
            });
