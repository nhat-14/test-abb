name: English Comment Guard

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-comment-language:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR comment language
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload;

            const hasJapanese = (text) => /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text || '');
            const hasEnglishLetters = (text) => /[A-Za-z]/.test(text || '');

            let body = '';
            let author = '';
            let prNumber = null;
            let reviewCommentId = null;

            if (eventName === 'issue_comment') {
              if (!payload.issue?.pull_request) {
                core.info('Not a PR comment. Skipping.');
                return;
              }
              body = payload.comment?.body || '';
              author = payload.comment?.user?.login || 'unknown';
              prNumber = payload.issue.number;
            }

            if (eventName === 'pull_request_review_comment') {
              body = payload.comment?.body || '';
              author = payload.comment?.user?.login || 'unknown';
              prNumber = payload.pull_request?.number;
              reviewCommentId = payload.comment?.id;
            }

            if (eventName === 'pull_request_review') {
              body = payload.review?.body || '';
              author = payload.review?.user?.login || 'unknown';
              prNumber = payload.pull_request?.number;
            }

            if (!prNumber) {
              core.info('PR number not found. Skipping.');
              return;
            }

            if (!body.trim()) {
              core.info('Empty review/comment body. Skipping.');
              return;
            }

            if (author === 'github-actions[bot]') {
              core.info('Bot comment. Skipping.');
              return;
            }

            const isViolation = hasJapanese(body);

            if (!isViolation) {
              core.info('Comment language check passed.');
              return;
            }

            const message = [
              `@${author} Please use English for review comments in this PR.`,
              '',
              'Japanese text was detected. Please update your comment as follows:',
              '- Rewrite the comment in English',
              '- If needed, keep the Japanese text as an additional note',
              '',
              'Example:',
              '- Japanese: 「この変数名をより意図が分かる名前に変更してください」',
              '- English: "Please rename this variable to better reflect its intent."'
            ].join('\n');

            if (eventName === 'pull_request_review_comment' && reviewCommentId) {
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                comment_id: reviewCommentId,
                body: message
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: message
              });
            }

            core.setFailed('Japanese text detected. Please use English for PR review comments.');
