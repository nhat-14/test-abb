<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>略語辞典 - Abbreviation Dictionary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>略語辞典 (Abbreviation Dictionary)</h1>
            <p class="subtitle">社内略語検索システム</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="略語または意味を検索..."
                    autocomplete="off"
                >
            </div>
        </div>

        <div class="actions">
            <button id="addNewBtn" class="btn-primary">➕ 新しい略語を追加</button>
        </div>

        <div id="loading" class="loading">データを読み込んでいます...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div class="table-container">
            <table id="abbreviationsTable">
                <thead>
                    <tr>
                        <th>略語</th>
                        <th>意味 (日本語)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <div id="noResults" class="no-results" style="display: none;">
            検索結果が見つかりませんでした
        </div>

        <footer>
            <p>行をクリックして編集、または「➕ 新しい略語を追加」で新規登録できます。</p>
        </footer>
    </div>

    <!-- Modal for adding new abbreviation -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>新しい略語を追加</h2>
            
            <form id="addForm">
                <div class="form-group">
                    <label for="abbr">略語 *</label>
                    <input type="text" id="abbr" required placeholder="略語を入力">
                </div>
                
                <div class="form-group">
                    <label for="meaningJa">意味 (日本語) *</label>
                    <input type="text" id="meaningJa" required placeholder="日本語の意味を入力">
                </div>

                <div class="form-actions">
                    <button type="button" id="saveBtn" class="btn-primary">💾 保存してコピー</button>
                    <button type="button" id="cancelBtn" class="btn-secondary">キャンセル</button>
                </div>
            </form>

            <div id="saveSuccess" class="copy-success" style="display: none;">
                <div id="csvOutput"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
